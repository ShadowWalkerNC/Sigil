[phases.setup]
nixPkgs = [
  "nodejs_20",
  "python3",
  "pkg-config",
  "cairo",
  "pango",
  "libjpeg",
  "giflib",
  "librsvg",
  "pixman",
  "glib",
  "fontconfig",
]

[phases.build]
cmds = [
  "npm install --omit=dev",
  "export PKG_CONFIG_PATH=$(pkg-config --variable pc_path pkg-config 2>/dev/null || find /root/.nix-profile/lib/pkgconfig /nix/store -name 'pixman-1.pc' -printf '%h:' 2>/dev/null | sed 's/:$//') && npm rebuild canvas --build-from-source"
]

[start]
cmd = "node start.js"
