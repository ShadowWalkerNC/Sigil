[build]
# Install native build dependencies so node-gyp can compile canvas from source.
# Required because canvas@2.11.2 has no pre-built binary for Node 22 (ABI v127).
[build.environment]
RAILPACK_BUILD_APT_PACKAGES = "build-essential pkg-config libcairo2-dev libjpeg-dev libpango1.0-dev libgif-dev librsvg2-dev libpixman-1-dev"

[deploy]
startCommand = "node src/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
