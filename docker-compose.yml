version: "3.8"
services:
  sigil-bot:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./sigil.db:/app/sigil.db

  sigil-gui:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "3420:3420"
    command: ["node", "gui/gui-server.js"]
    volumes:
      - ./sigil.db:/app/sigil.db
